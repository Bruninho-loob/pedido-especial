<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido de Namoro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 90%;
            text-align: center;
            animation: fadeIn 2s;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .foto-casal {
            width: 100%;
            max-width: 300px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h1 {
            color: #e91e63;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 1.1em;
            margin: 10px 0;
        }

        button {
            border: none;
            padding: 15px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-principal { background-color: #e91e63; color: white; width: 100%; }
        .btn-sim { background-color: #4caf50; color: white; width: 100%; }
        .btn-nao { background-color: #9e9e9e; color: white; width: 100%; position: relative; }

        #message, #final-feliz { display: none; }

        .texto-sucesso {
            color: #e91e63;
            font-size: 1.4em;
            font-weight: bold;
            animation: heartBeat 1.2s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .hearts-floating {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 2em;
            animation: float 4s linear infinite;
            opacity: 0.8;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="hearts-floating" id="hearts-bg"></div>

    <div class="container" id="painel">
        <img src="foto.jpeg" alt="Nossa Foto" class="foto-casal" id="foto-exibida">
        
        <div id="conteudo-inicial">
            <h1>Oii Ana</h1>
            <p>Tenho uma pergunta a te fazer...</p>
            <button class="btn-principal" onclick="showMessage()">Toque aqui para descobrir</button>
        </div>

        <div id="message">
            <h1>Você aceita namorar comigo?</h1>
            <div class="btn-group">
                <button class="btn-sim" onclick="aceitou()">Sim, eu quero! ❤️</button>
                <button id="btnNao" class="btn-nao" onmouseover="fugir()" onclick="rejeitou()">Não quero...</button>
            </div>
        </div>

        <div id="final-feliz">
            <p class="texto-sucesso">TE AMO MINHA PRINCESA!</p>
            <p>Seremos felizes meu amor</p>
        </div>
    </div>

    <script>
        function showMessage() {
            document.getElementById('message').style.display = 'block';
            document.getElementById('conteudo-inicial').style.display = 'none';
        }

        function fugir() {
            const btnNao = document.getElementById('btnNao');
            const larguraJanela = window.innerWidth - 150;
            const alturaJanela = window.innerHeight - 50;

            const novaPosicaoX = Math.random() * larguraJanela;
            const novaPosicaoY = Math.random() * alturaJanela;

            btnNao.style.position = "fixed";
            btnNao.style.left = novaPosicaoX + "px";
            btnNao.style.top = novaPosicaoY + "px";
            btnNao.style.width = "120px";
        }

        function aceitou() {
          
            document.getElementById('message').style.display = 'none';
            
          
            document.getElementById('foto-exibida').src = 'foto_feliz.jpeg';
            
            
            document.getElementById('final-feliz').style.display = 'block';
            
            
            const heartsBg = document.getElementById('hearts-bg');
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 2 + 's';
                heartsBg.appendChild(heart);
            }
        }
    </script>
</body>
</html>
